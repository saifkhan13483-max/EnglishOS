<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>EnglishOS — Learn English in 300 Days</title>

    <!-- SEO -->
    <meta name="description" content="EnglishOS is the most methodologically rigorous English learning platform for South Asian learners. DiSS + Feynman + Spaced Repetition + Serial Mastery. 300 days to fluency." />
    <meta name="keywords" content="English learning, Urdu English, Roman Urdu, learn English, English course Pakistan, English course India" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="EnglishOS — An Operating System for Learning English" />
    <meta property="og:description" content="Not a language app. A 300-day operating system for English fluency. Built for Urdu/Hindi speakers using proven learning science." />
    <meta property="og:image" content="/icon-192.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="EnglishOS — Learn English in 300 Days" />
    <meta name="twitter:description" content="Not a language app. A 300-day operating system for English fluency. Built for Urdu/Hindi speakers." />

    <!-- PWA / mobile browser meta -->
    <meta name="theme-color" content="#0C0C14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EnglishOS" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to Google Fonts CDN (eliminates DNS+TLS round-trip before font fetch) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font stylesheet (display=swap prevents invisible text during load) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Nastaliq+Urdu:wght@400;700&family=Noto+Sans+Devanagari:wght@400;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
